<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>फीडबैक और रेटिंग - My Indian Workers</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; padding: 15px; display: flex; justify-content: center; }
        .feedback-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #f39c12; margin-bottom: 10px; }
        
        /* स्टार रेटिंग स्टाइल */
        .stars { margin: 20px 0; display: flex; justify-content: center; flex-direction: row-reverse; }
        .stars input { display: none; }
        .stars label { font-size: 40px; color: #ddd; cursor: pointer; transition: 0.2s; }
        .stars input:checked ~ label { color: #f39c12; }
        .stars label:hover, .stars label:hover ~ label { color: #f1c40f; }

        textarea { width: 100%; height: 100px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; resize: none; box-sizing: border-box; font-size: 14px; }
        .btn-submit { background: #f39c12; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 16px; }
        .success-msg { display: none; color: #27ae60; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div class="feedback-card">
    <h2>🌟 आपका अनुभव?</h2>
    <p style="font-size: 14px; color: #666;">कृपया कारीगर के काम को रेटिंग दें</p>

    <form id="feedbackForm">
        <div class="stars">
            <input type="radio" name="rating" value="5" id="star5"><label for="star5">★</label>
            <input type="radio" name="rating" value="4" id="star4"><label for="star4">★</label>
            <input type="radio" name="rating" value="3" id="star3"><label for="star3">★</label>
            <input type="radio" name="rating" value="2" id="star2"><label for="star2">★</label>
            <input type="radio" name="rating" value="1" id="star1"><label for="star1">★</label>
        </div>

        <input type="text" id="fbName" placeholder="आपका नाम" required style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;">
        
        <textarea id="fbComment" placeholder="अपना सुझाव या अनुभव यहाँ लिखें..."></textarea>

        <button type="submit" id="submitBtn" class="btn-submit">सबमिट करें</button>
    </form>

    <div id="thankYou" class="success-msg">
        ✅ धन्यवाद! आपका फीडबैक हमें मिल गया है।
        <br><br>
        <a href="index.html" style="color: #2980b9; text-decoration: none;">मुख्य पेज पर जाएं</a>
    </div>
</div>

<script>
    const SCRIPT_URL = "आपका_GOOGLE_SCRIPT_URL_यहाँ_डालें";

    document.getElementById('feedbackForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('submitBtn');
        const rating = document.querySelector('input[name="rating"]:checked');
        const name = document.getElementById('fbName').value;
        const comment = document.getElementById('fbComment').value;

        if (!rating) {
            alert("कृपया स्टार रेटिंग चुनें!");
            return;
        }

        btn.innerText = "⏳ सबमिट हो रहा है...";
        btn.disabled = true;

        const data = {
            userType: "feedback",
            rating: rating.value,
            name: name,
            comment: comment
        };

        // डेटा भेजना (Google Sheet पर)
        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(data)
        }).then(() => {
            document.getElementById('feedbackForm').style.display = 'none';
            document.getElementById('thankYou').style.display = 'block';
        }).catch(err => {
            alert("कुछ गड़बड़ हुई, दोबारा कोशिश करें।");
            btn.innerText = "सबमिट करें";
            btn.disabled = false;
        });
    });
</script>

</body>
</html>
