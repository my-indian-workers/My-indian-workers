<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>लॉगिन चुनाव</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f4f4; margin: 0; }
        .box { background: white; padding: 30px; border-radius: 10px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn { display: block; width: 200px; padding: 15px; margin: 10px auto; text-decoration: none; color: white; font-weight: bold; border-radius: 5px; }
        .worker { background: #e67e22; } /* वर्कर के लिए ऑरेंज */
        .owner { background: #2c3e50; }  /* मालिक के लिए डार्क ब्लू */
    </style>
</head>
<body>
    <div class="box">
    <h1>आप कौन हैं?</h1>
    <a href="worker-form.html" class="btn worker">वर्कर लॉगिन</a>
    <a href="owner-form.html" class="btn owner">मालिक लॉगिन</a>
    <br>
    <a href="index.html" style="color: gray; text-decoration: none;">वापस जाएँ</a>
</div>

</body>
</html>
