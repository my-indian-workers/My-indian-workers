<!-- Booking Form -->
<form id="bookingForm">
    
    <h2>Karigar Book Kare</h2>

    <input type="text" placeholder="Malik Name" id="name" required><br><br>
    
    <input type="text" placeholder="Karigar Type" required><br><br>

    <button type="submit">Submit Booking</button>

</form>

<script>
document.getElementById("bookingForm").addEventListener("submit", function(e){

    e.preventDefault();

    let malik = localStorage.getItem("malikRegistered");

    if(malik !== "yes"){
        alert("Pehle Malik Registration kare");

        window.location.href = "malik-registration.html";
    }
    else{
        alert("Karigar Booking Successful");
    }

});
</script>
